version: '3.8'

services:
  app:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: rag_pdf_system
    ports:
      - "8000:8000"
    volumes:
      - ../:/app
      - ../data:/app/data
      - ../logs:/app/logs
    environment:
      - APP_ENV=development
      - MILVUS_HOST=milvus-standalone
      - MILVUS_PORT=19530
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_HOST=rabbitmq
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      - milvus-standalone
      - redis
      - rabbitmq
    networks:
      - rag_net

  worker:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: rag_worker
    command: celery -A src.worker.celery_app worker --loglevel=info
    volumes:
      - ../:/app
      - ../data:/app/data
      - ../logs:/app/logs
    environment:
      - APP_ENV=development
      - MILVUS_HOST=milvus-standalone
      - MILVUS_PORT=19530
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_HOST=rabbitmq
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      - rabbitmq
      - redis
      - milvus-standalone
    networks:
      - rag_net

  flower:
    image: mher/flower
    container_name: rag_flower
    command: celery flower
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - rabbitmq
      - redis
    networks:
      - rag_net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rag_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - rag_net

  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - milvus_etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - rag_net

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - milvus_minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    networks:
      - rag_net

  milvus-standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.3.4
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    networks:
      - rag_net

  redis:
    container_name: rag_redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rag_net

networks:
  rag_net:
    driver: bridge

volumes:
  milvus_etcd_data:
  milvus_minio_data:
  milvus_data:
  redis_data:
  rabbitmq_data:
